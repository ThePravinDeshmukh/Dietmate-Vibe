services:
  # React/Node frontend
  - type: web
    name: iem-vibe
    env: node
    plan: free
    buildCommand: cd diet-tracker-react && npm install && npm run build
    startCommand: cd diet-tracker-react && npm run server
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
    autoDeploy: true
    rootDir: .

  # Python FastAPI backend
  - type: web
    name: dietmate-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    autoDeploy: true
    rootDir: .

  # FastMCP server (HTTP/streamable-http transport)
  - type: web
    name: dietmate-mcp
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py --http
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true
    rootDir: .


